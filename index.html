<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karupatti coffee menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="summ.css">
</head>

<body>

    <header class="main-header">
        <h1 class="title">
            <i class="fa-solid fa-mug-hot"></i> Karupatti coffee
        </h1>
        <p class="subtitle">Healthy and tasty</p>
    </header>

    <main class="menu-container">


        <h2 class="style3">Our Menu</h2>

        <div class="menu-grid">

            <div class="menu-card">
                <div class="dish-img">
                    <img src="coffee.jpg" loading="lazy" alt="coffee">
                </div>
                <div class="dish-info">
                    <h3>coffee</h3>
                    <p class="price">₹25</p>
                </div>
            </div>

            <div class="menu-card">
                <div class="dish-img">
                    <img src="samosa.jpg" loading="lazy" alt="samosa">
                </div>
                <div class="dish-info">
                    <h3>Samosa</h3>
                    <p class="price">₹10</p>
                </div>
            </div>
            <div class="menu-card">
                <div class="dish-img">
                    <img src="halwa.jpg" loading="lazy" alt="halwa">
                </div>
                <div class="dish-info">
                    <h3>Halwa</h3>
                    <p class="price">₹50</p>
                </div>
            </div>
            <div class="menu-card">
                <div class="dish-img">
                    <img src="Tea.jpg" loading="lazy" alt="tea">
                </div>
                <div class="dish-info">
                    <h3>Tea</h3>
                    <p class="price">₹25</p>
                </div>
            </div>

            <div class="menu-card">
                <div class="dish-img">
                    <img src="puffs.jpg" loading="lazy" alt="puffs">
                </div>
                <div class="dish-info">
                    <h3>Puffs</h3>
                    <p class="price">₹20</p>
                </div>
            </div>

            <div class="menu-card">
                <div class="dish-img">
                    <img src="butterbiscuits.jpg" loading="lazy" alt="butterbiscuit">
                </div>
                <div class="dish-info">
                    <h3>Butter Biscuits</h3>
                    <p class="price">₹5</p>
                </div>
            </div>

        </div>
    </main>

    <footer class="contact-footer">
        <h3 class="contact-title" style="align-self: center;">Contact Us</h3>
        <div class="contact-item">
            <i class="fa-solid fa-phone"></i>
            <span>+91 98765 43210</span>
        </div>

        <div class="contact-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>Near Government Hospital</span>
        </div>

        <div class="contact-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>Virudhunagar</span>
        </div>

    </footer>


    <script>
        const cards = document.querySelectorAll('.menu-card');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        }, {
            threshold: 0.2
        });

        cards.forEach(card => {
            observer.observe(card);
        });
    </script>

</body>

</html>
